name: Release

on:
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os_label }} ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_label: Linux
            arch: x86_64
            archive_ext: tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os_label: Linux
            arch: arm64
            archive_ext: tar.gz
          - runner: macos-13
            target: x86_64-apple-darwin
            os_label: Darwin
            arch: x86_64
            archive_ext: tar.gz
          - runner: macos-latest
            target: aarch64-apple-darwin
            os_label: Darwin
            arch: arm64
            archive_ext: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            os_label: Windows
            arch: x86_64
            archive_ext: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          archive="platys_${{ matrix.os_label }}_${{ matrix.arch }}.tar.gz"
          tar -czvf "$archive" -C "target/${{ matrix.target }}/release" platys
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Package archive (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $archive = "platys_${{ matrix.os_label }}_${{ matrix.arch }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/platys.exe" -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload archive as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: platys-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums.txt
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Attach archives and checksums to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
